<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ສະຕັອກສິນຄ້າ</title>
  <link href="https://fonts.googleapis.com/css2?family=Saysettha+OT&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2436;
      --border: #2a3048;
      --text: #e8ecf4;
      --text-muted: #7a849e;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --green: #3ecf8e;
      --green-dim: rgba(62,207,142,0.12);
      --yellow: #f5c842;
      --yellow-dim: rgba(245,200,66,0.12);
      --red: #f45c5c;
      --red-dim: rgba(244,92,92,0.12);
      --radius: 10px;
      --font: 'Saysettha OT', sans-serif;
      --mono: 'Saysettha OT', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo span {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Summary bar */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
    }
    .stat-value.accent { color: var(--accent); }
    .stat-value.green { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.red { color: var(--red); }

    /* Main content */
    .main { padding: 0 32px; }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px 10px 38px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.88; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.018); }

    /* Status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge.in { background: var(--green-dim); color: var(--green); }
    .badge.in .badge-dot { background: var(--green); }
    .badge.low { background: var(--yellow-dim); color: var(--yellow); }
    .badge.low .badge-dot { background: var(--yellow); }
    .badge.out { background: var(--red-dim); color: var(--red); }
    .badge.out .badge-dot { background: var(--red); }

    /* Price display */
    .price { font-family: var(--mono); font-size: 13px; color: var(--text); }
    .price-total { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 500; }

    /* Actions */
    .actions { display: flex; gap: 6px; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .icon-btn.del:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

    /* Grand total */
    .grand-total-row td {
      background: var(--surface2);
      border-top: 2px solid var(--border);
      font-weight: 600;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 28px 24px;
      width: 420px;
      max-width: 95vw;
      animation: slideUp 0.18s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .modal h2 {
      font-size: 17px; font-weight: 600;
      margin-bottom: 22px;
      color: var(--text);
    }
    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .form-row input, .form-row select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
    .form-row select option { background: var(--surface); }

    .modal-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 9px 18px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-save {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 9px 22px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.88; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* ============================================
       RESPONSIVE BREAKPOINTS
       320  – Phone portrait
       480  – Phone landscape / portrait
       600  – Small tablet portrait
       768  – Large tablet portrait
       1024 – Large tablet landscape / small desktop
       1280 – Desktop
       1440+– Wide screen desktop
    ============================================ */

    /* ── Wide screen desktop: 1440px+ ── */
    @media (min-width: 1440px) {
      .summary-bar { padding: 28px 48px; gap: 20px; }
      .main { padding: 0 48px; }
      header { padding: 20px 48px; }
      .stat-value { font-size: 26px; }
    }

    /* ── Desktop: 1280px ── */
    @media (max-width: 1279px) {
      .summary-bar { padding: 20px 28px; }
      .main { padding: 0 28px; }
      header { padding: 18px 28px; }
    }

    /* ── Large tablet landscape: 1024px ── */
    @media (max-width: 1023px) {
      .summary-bar { grid-template-columns: repeat(2, 1fr); padding: 16px 20px; gap: 12px; }
      .main { padding: 0 20px; }
      header { padding: 16px 20px; }
      /* hide category column */
      th:nth-child(3), td:nth-child(3) { display: none; }
    }

    /* ── Large tablet portrait: 768px ── */
    @media (max-width: 767px) {
      .logo h1 { font-size: 16px; }
      .logo span { display: none; }
      .stat-value { font-size: 18px; }
      /* hide price-per-unit column */
      th:nth-child(5), td:nth-child(5) { display: none; }
      /* filters wrap below search */
      .toolbar { flex-wrap: wrap; }
      .search-wrap { flex: 1 1 100%; order: -1; }
      .btn-add { margin-left: auto; }
    }

    /* ── Small tablet portrait: 600px ── */
    @media (max-width: 599px) {
      .summary-bar { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 14px 14px; }
      .main { padding: 0 14px; }
      header { padding: 14px; }
      /* hide row number & total-value columns */
      th:nth-child(1), td:nth-child(1),
      th:nth-child(6), td:nth-child(6) { display: none; }
      td, th { padding: 10px 10px; }
      .grand-total-row td:first-child { display: table-cell !important; }
    }

    /* ── Phone landscape + portrait: 480px ── */
    @media (max-width: 479px) {
      .summary-bar { grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
      .stat-card { padding: 12px 14px; }
      .stat-label { font-size: 10px; }
      .stat-value { font-size: 16px; }
      /* keep only: name, qty, status, actions */
      th:nth-child(4), td:nth-child(4) { font-size: 12px; }
      .filter-btn { padding: 8px 10px; font-size: 12px; }
      .btn-add { padding: 8px 14px; font-size: 13px; }
      .modal { padding: 20px 18px 18px; }
    }

    /* ── Phone portrait: 320px ── */
    @media (max-width: 319px) {
      .summary-bar { grid-template-columns: 1fr; }
      header { padding: 10px; }
      .logo-icon { width: 28px; height: 28px; font-size: 14px; }
      .logo h1 { font-size: 14px; }
      .btn-add span { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    <div>
      <h1>ສະຕັອກສິນຄ້າ Present Beauty Lounge
</h1>
      <span>ລະບົບຈັດການຄັງສິນຄ້າ</span>
    </div>
  </div>
</header>

<div class="summary-bar" id="summaryBar"></div>

<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ຄົ້ນຫາສິນຄ້າ" oninput="render()" />
    </div>
    <button class="filter-btn active" id="fAll" onclick="setFilter('all')">ທັງຫມົດ</button>
    <button class="filter-btn" id="fIn" onclick="setFilter('in')">ມີ</button>
    <button class="filter-btn" id="fLow" onclick="setFilter('low')">ໃກ້ຫມົດ</button>
    <button class="filter-btn" id="fOut" onclick="setFilter('out')">ຫມດ</button>
    <button class="btn-add" onclick="openAdd()">＋ ເພິ່ມສິນຄ້າ</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ຊື່ສິນຄ້າ</th>
          <th>ຫມວດຫມູ່</th>
          <th>ຈຳນວນ (ອັນ)</th>
          <th>ລາຄາ/ອັນ (₭)</th>
          <th>ມູນຄ່າລວມ (₭)</th>
          <th>ສະຖານະ</th>
          <th>ຈັດການ</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot id="tableFoot"></tfoot>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">ເພິ່ນສິນຄ້າໃຫມ່</h2>
    <div class="form-row">
      <label>ຊື່ສິນຄ້າ</label>
      <input type="text" id="fName" placeholder="ເຊັ່ນນ້ຳດື່ມຕຸກ 1.5L" />
    </div>
    <div class="form-row">
      <label>ຫມວດຫມູ່</label>
      <input type="text" id="fCat" placeholder="ເຊັ່ນ ເຄື່ອງດື່ມ" />
    </div>
    <div class="form-row">
      <label>ຈຳນວນ (ອັນ)</label>
      <input type="number" id="fQty" min="0" placeholder="0" />
    </div>
    <div class="form-row">
      <label>ລາຄາ/ອັນ (₭)</label>
      <input type="number" id="fPrice" min="0" step="0.01" placeholder="0.00" />
    </div>
    <div class="form-row">
      <label>ໃກ້ຫມົດ (ອັນ)</label>
      <input type="number" id="fThresh" min="1" placeholder="10" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button>
      <button class="btn-save" onclick="saveItem()">ບັນທຶກ</button>
    </div>
  </div>
</div>

  ];
  let nextId = Math.max(...items.map(i=>i.id), 0) + 1;
  let editId = null;
  let filterStatus = 'all';

  function save() { /* data lives in memory only */ }

  function statusOf(item) {
    if (item.qty === 0) return 'out';
    if (item.qty <= item.thresh) return 'low';
    return 'in';
  }

  function badgeHtml(item) {
    const s = statusOf(item);
    const labels = { in: 'ມີ', low: 'ໃກ້ຫມົດ', out: 'ຫມົດ' };
    return `<span class="badge ${s}"><span class="badge-dot"></span>${labels[s]}</span>`;
  }

  function fmt(n) { return Number(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2}); }

  function setFilter(f) {
    filterStatus = f;
    ['All','In','Low','Out'].forEach(x => document.getElementById('f'+x).classList.remove('active'));
    document.getElementById('f' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
    render();
  }

  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = items.filter(i => {
      const matchSearch = i.name.toLowerCase().includes(q) || i.cat.toLowerCase().includes(q);
      const matchFilter = filterStatus === 'all' || statusOf(i) === filterStatus;
      return matchSearch && matchFilter;
    });

    const tbody = document.getElementById('tableBody');
    const tfoot = document.getElementById('tableFoot');

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty"><div class="empty-icon">🔍</div>ບໍ່ພົບສິນຄ້າ</div></td></tr>`;
      tfoot.innerHTML = '';
    } else {
      tbody.innerHTML = filtered.map((item, idx) => {
        const total = item.qty * item.price;
        return `<tr>
          <td style="color:var(--text-muted);font-size:12px;font-family:var(--mono)">${String(idx+1).padStart(2,'0')}</td>
          <td><strong>${item.name}</strong></td>
          <td style="color:var(--text-muted);font-size:13px">${item.cat}</td>
          <td><span style="font-family:var(--mono);font-weight:600">${item.qty.toLocaleString()}</span></td>
          <td><span class="price">${fmt(item.price)}</span></td>
          <td><span class="price-total">${fmt(total)}</span></td>
          <td>${badgeHtml(item)}</td>
          <td><div class="actions">
            <button class="icon-btn" onclick="openEdit(${item.id})" title="ແກ້ໄຂ">✏️</button>
            <button class="icon-btn del" onclick="deleteItem(${item.id})" title="ລົບ">🗑️</button>
          </div></td>
        </tr>`;
      }).join('');

      const grandTotal = filtered.reduce((s, i) => s + i.qty * i.price, 0);
      tfoot.innerHTML = `<tr class="grand-total-row">
        <td colspan="5" style="text-align:right;color:var(--text-muted);font-size:13px">ມູນຄ່າລວມສິນຄ້າທັງ
          ຫມົດ
        </td>
        <td style="font-family:var(--mono);color:var(--accent);font-size:16px">₭ ${fmt(grandTotal)}</td>
        <td colspan="2"></td>
      </tr>`;
    }

    // Summary
    const total = items.length;
    const inStock = items.filter(i => statusOf(i) === 'in').length;
    const lowStock = items.filter(i => statusOf(i) === 'low').length;
    const outStock = items.filter(i => statusOf(i) === 'out').length;
    const grandVal = items.reduce((s,i) => s + i.qty * i.price, 0);

    document.getElementById('summaryBar').innerHTML = `
      <div class="stat-card"><div class="stat-label">ສິນຄ້າທັງຫມົດ</div><div class="stat-value accent">${total} ລາຍການ</div></div>
      <div class="stat-card"><div class="stat-label">ສະຖານະ ມີ</div><div class="stat-value green">${inStock} ລາຍການ</div></div>
      <div class="stat-card"><div class="stat-label">ໃກ້ຫມົດ / ຫມົດ</div><div class="stat-value yellow">${lowStock} / <span style="color:var(--red)">${outStock}</span></div></div>
      <div class="stat-card"><div class="stat-label">ມູນຄ່າລວມທັງຫມົດ</div><div class="stat-value" style="font-family:var(--mono)"> ₭ ${fmt(grandVal)}</div></div>
    `;
  }

  function openAdd() {
    editId = null;
    document.getElementById('modalTitle').textContent = 'ເພິ່ມສິນຄ້າໃຫມ່';
    document.getElementById('fName').value = '';
    document.getElementById('fCat').value = '';
    document.getElementById('fQty').value = '';
    document.getElementById('fPrice').value = '';
    document.getElementById('fThresh').value = '10';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('fName').focus();
  }

  function openEdit(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    editId = id;
    document.getElementById('modalTitle').textContent = 'ແກ້ໄຂສິນຄ້າ';
    document.getElementById('fName').value = item.name;
    document.getElementById('fCat').value = item.cat;
    document.getElementById('fQty').value = item.qty;
    document.getElementById('fPrice').value = item.price;
    document.getElementById('fThresh').value = item.thresh;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  function saveItem() {
    const name = document.getElementById('fName').value.trim();
    const cat = document.getElementById('fCat').value.trim() || 'ທົ່ວໄປ';
    const qty = parseInt(document.getElementById('fQty').value) || 0;
    const price = parseFloat(document.getElementById('fPrice').value) || 0;
    const thresh = parseInt(document.getElementById('fThresh').value) || 10;
    if (!name) { document.getElementById('fName').focus(); return; }

    if (editId) {
      const item = items.find(i => i.id === editId);
      if (item) Object.assign(item, { name, cat, qty, price, thresh });
    } else {
      items.push({ id: nextId++, name, cat, qty, price, thresh });
    }
    save(); closeModal(); render();
  }

  function deleteItem(id) {
    if (!confirm('ລົບສິນຄ້າໃນສະຕັອກ?')) return;
    items = items.filter(i => i.id !== id);
    save(); render();
  }

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // Enter key in modal
  document.getElementById('modalOverlay').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveItem();
    if (e.key === 'Escape') closeModal();
  });

  render();
</script>
